services:
  postgres:
    image: postgres:17-alpine
    container_name: monthly-goal-tracker-postgres
    environment:
      POSTGRES_DB: monthly_goal_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monthly_goal_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
